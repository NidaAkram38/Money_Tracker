<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PocketPal – Money Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════ LOCK SCREEN ══════════════ -->
  <div id="lock-screen">
    <div class="lock-blob lock-blob-1"></div>
    <div class="lock-blob lock-blob-2"></div>
    <div class="lock-blob lock-blob-3"></div>

    <div class="lock-card">
      <div class="lock-logo">💰</div>
      <h1 class="lock-title">PocketPal</h1>
      <p class="lock-sub" id="lock-sub">Your cute little money diary 🌸</p>

      <div id="signup-fields" style="display:none;">
        <input class="field" type="text" id="reg-name" placeholder="✏️  Your name" autocomplete="off" />
      </div>

      <input class="field" type="password" id="pin-input" placeholder="🔒  Enter your PIN" maxlength="20" />

      <div id="pin-confirm-wrap" style="display:none;">
        <input class="field" type="password" id="pin-confirm" placeholder="🔒  Confirm PIN" maxlength="20" />
      </div>

      <p class="lock-error" id="lock-error"></p>

      <button class="btn-lock" id="lock-btn">Let me in! ✨</button>
      <p class="lock-switch" id="lock-switch">New here? Create account →</p>
    </div>
  </div>

  <!-- ══════════════ MAIN APP ══════════════ -->
  <div id="app" style="display:none;">

    <!-- TOP BAR -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="topbar-logo">💰</span>
        <span class="topbar-brand">PocketPal</span>
      </div>
      <div class="topbar-right">
        <select id="month-select" class="month-select" onchange="switchMonth()"></select>
        <button class="btn-icon" onclick="logout()" title="Logout">👋</button>
      </div>
    </header>

    <!-- BOTTOM NAV TABS -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="dashboard" onclick="showTab('dashboard')">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-btn" data-tab="add" onclick="showTab('add')">
        <span class="nav-fab">＋</span>
      </button>
      <button class="nav-btn" data-tab="history" onclick="showTab('history')">
        <span class="nav-icon">📅</span>
        <span class="nav-label">History</span>
      </button>
      <button class="nav-btn" data-tab="settings" onclick="showTab('settings')">
        <span class="nav-icon">⚙️</span>
        <span class="nav-label">Settings</span>
      </button>
    </nav>

    <!-- PAGES -->
    <main class="pages">

      <!-- ── DASHBOARD ── -->
      <section class="page active" id="tab-dashboard">
        <div class="greet-bar">
          <p class="greet-text">Hey <strong id="greet-name">friend</strong>! 👋</p>
          <p class="greet-month" id="greet-month"></p>
        </div>

        <!-- Budget Hero Card -->
        <div class="hero-card">
          <div class="hero-top">
            <div>
              <p class="hero-label">Monthly Budget</p>
              <p class="hero-amount" id="s-budget">Rs. 0</p>
            </div>
            <button class="btn-edit-budget" onclick="focusBudget()">✏️ Edit</button>
          </div>

          <div class="hero-bar-wrap">
            <div class="hero-bar">
              <div class="hero-bar-fill" id="progress-fill"></div>
            </div>
            <span class="hero-pct" id="s-pct">0%</span>
          </div>

          <div class="hero-stats">
            <div class="hero-stat">
              <span class="hstat-icon spent-icon">💸</span>
              <div>
                <p class="hstat-label">Spent</p>
                <p class="hstat-val spent-val" id="s-spent">Rs. 0</p>
              </div>
            </div>

            <div class="hero-divider"></div>

            <div class="hero-stat">
              <span class="hstat-icon left-icon" id="left-icon">🟢</span>
              <div>
                <p class="hstat-label" id="leftover-label">Remaining</p>
                <p class="hstat-val" id="s-left" style="color:var(--green)">Rs. 0</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Budget Input Panel -->
        <div class="budget-panel" id="budget-panel" style="display:none;">
          <p class="panel-title">Set your budget for <span id="panel-month-label"></span></p>
          <div class="budget-row">
            <div class="field-wrap">
              <span class="field-prefix">Rs.</span>
              <input class="field field-prefixed" type="number" id="budget-input" placeholder="e.g. 5000" min="0" />
            </div>
            <button class="btn-save" onclick="saveBudget()">Save 💾</button>
          </div>
        </div>

        <div class="section-header">
          <h2 class="section-title">Expenses</h2>
          <span class="badge" id="exp-count">0</span>
        </div>

        <div id="expense-list"></div>
      </section>

    </main>
  </div>

  <script src="app.js"></script>

  <script>
  /* FIX FOR EDIT BUTTON */
  function focusBudget(){
      const panel = document.getElementById("budget-panel");
      const input = document.getElementById("budget-input");

      panel.style.display = "block";
      input.focus();
  }
  </script>

</body>
</html>
