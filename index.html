<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PocketPal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lock-screen" class="lock">
  <h2>PocketPal 🔒</h2>
  <input id="pin-input" type="password" placeholder="Enter PIN">
  <button id="lock-btn">Unlock</button>
  <p id="lock-error"></p>
</div>

<!-- APP -->
<div id="app">

<header class="top">
  <h2>Hello <span id="greet-name">friend</span> 👋</h2>
  <p id="greet-month"></p>

  <select id="month-select" onchange="switchMonth()"></select>

  <button onclick="focusBudget()">✏️ Edit Budget</button>
</header>

<!-- BUDGET PANEL -->
<div id="budget-panel">
  <input id="budget-input" type="number" placeholder="Enter budget">
  <button onclick="saveBudget()">Save</button>
</div>

<!-- DASHBOARD -->
<section id="tab-dashboard" class="page active">

<div class="card">
  <p>Budget</p>
  <h2 id="s-budget">0</h2>
</div>

<div class="card">
  <p>Spent</p>
  <h2 id="s-spent">0</h2>
</div>

<div class="card">
  <p>Remaining</p>
  <h2 id="s-left">0</h2>
</div>

<div id="progress">
  <div id="progress-fill"></div>
</div>

<h3>Expenses</h3>
<div id="expense-list"></div>

</section>

<!-- ADD EXPENSE -->
<section id="tab-add" class="page">

<input id="exp-amount" type="number" placeholder="Amount">
<input id="exp-date" type="date">

<input id="exp-place" placeholder="Place">
<input id="exp-note" placeholder="Note">

<div id="cat-chips"></div>

<button onclick="addExpense()">Add Expense</button>

</section>

<!-- HISTORY -->
<section id="tab-history" class="page">
<div id="history-list"></div>
</section>

<!-- NAV -->
<nav class="bottom">

<button class="nav-btn active" onclick="showTab('dashboard')">
🏠
</button>

<button class="nav-btn" onclick="showTab('add')">
➕
</button>

<button class="nav-btn" onclick="showTab('history')">
📜
</button>

</nav>

</div>

<script src="app.js"></script>
</body>
</html>
